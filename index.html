<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>4 Model Rotation Switch</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    // MATERIAL (same as your working one)
    AFRAME.registerComponent('architect-filters', {
      schema: {
        color: {type: 'color', default: '#ffffff'},
        opacity: {type: 'number', default: 1.0}
      },
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;
          mesh.traverse((node) => {
            if (node.isMesh) {
              node.material.transparent = true;
              node.material.opacity = this.data.opacity;
              node.material.color.set(this.data.color);
              node.material.roughness = 0.7;
              node.material.metalness = 0.2;
            }
          });
        });
      }
    });

    // ROTATION SWITCH
    AFRAME.registerComponent('rotation-model-switch', {
      tick: function () {
        const marker = document.querySelector('#mainMarker');

        if (!marker || !marker.object3D.visible) return;

        // --- GET ROTATION ---
        const vector = new THREE.Vector3(0, 0, 1);
        vector.applyQuaternion(marker.object3D.quaternion);

        let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
        angle = (angle + 360) % 360;

        // --- SELECT MODEL ---
        let activeId;
        if (angle >= 315 || angle < 45) activeId = 'model1';
        else if (angle >= 45 && angle < 135) activeId = 'model2';
        else if (angle >= 135 && angle < 225) activeId = 'model3';
        else activeId = 'model4';

        // --- SHOW ONLY ONE MODEL ---
        const models = ['model1', 'model2', 'model3', 'model4'];
        models.forEach(id => {
          const el = document.querySelector('#' + id);
          if (el) el.object3D.visible = (id === activeId);
        });

        console.log("Angle:", angle.toFixed(0), "Active:", activeId);
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded 
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
           rotation-model-switch>

    <!-- LIGHT -->
    <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
    <a-entity light="type: directional; intensity: 1.0;" position="1 4 2"></a-entity>

    <!-- SINGLE MARKER -->
    <a-marker id="mainMarker" type="pattern" url="pattern-illum.patt">

      <!-- MODEL 1 -->
      <a-entity id="model1"
        gltf-model="url(cone.glb)"
        scale="12 12 12"
        position="0 0 0"
        visible="false"
        architect-filters="color: #ffffff; opacity: 0.9">
      </a-entity>

      <!-- MODEL 2 -->
      <a-entity id="model2"
        gltf-model="url(stair.glb)"
        scale="12 12 12"
        position="0 0 0"
        visible="false"
        architect-filters="color: #ffffff; opacity: 0.9">
      </a-entity>

      <!-- MODEL 3 -->
      <a-entity id="model3"
        gltf-model="url(wall.glb)"
        scale="12 12 12"
        position="0 0 0"
        visible="false"
        architect-filters="color: #ffffff; opacity: 0.9">
      </a-entity>

      <!-- MODEL 4 -->
      <a-entity id="model4"
        gltf-model="url(window.glb)"
        scale="12 12 12"
        position="0 3 0"
        rotation="0 90 0"
        visible="false"
        architect-filters="color: #ffffff; opacity: 0.9">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
