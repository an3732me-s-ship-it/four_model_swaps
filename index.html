<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>4 Model Rotation Switch</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('rotation-model-switch', {
        init: function () {
          this.currentState = -1;
        },

        tick: function () {
          const marker = document.querySelector('#marker-main');
          if (!marker || !marker.object3D.visible) return;

          // --- GET ROTATION ---
          var vector = new THREE.Vector3(0, 0, 1);
          vector.applyQuaternion(marker.object3D.quaternion);

          let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
          angle = (angle + 360) % 360;

          // --- 4 STATES ---
          let state;
          if (angle >= 315 || angle < 45) state = 0;
          else if (angle >= 45 && angle < 135) state = 1;
          else if (angle >= 135 && angle < 225) state = 2;
          else state = 3;

          if (state === this.currentState) return;
          this.currentState = state;

          const models = [
            document.querySelector('#model0'),
            document.querySelector('#model1'),
            document.querySelector('#model2'),
            document.querySelector('#model3')
          ];

          models.forEach((m, i) => {
            if (!m) return;
            m.setAttribute('visible', i === state);
          });

          console.log("Showing model:", state);
        }
      });

      // --- FORCE CLEAN WHITE MATERIAL AFTER LOAD ---
      AFRAME.registerComponent('force-white', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;

            mesh.traverse((node) => {
              if (node.isMesh) {
                node.material = new THREE.MeshStandardMaterial({
                  color: '#FFFFFF',
                  roughness: 0.8,
                  metalness: 0.0
                });
              }
            });
          });
        }
      });
    </script>
  </head>

  <body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" rotation-model-switch>

      <!-- LIGHTING (important for good shading) -->
      <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
      <a-entity light="type: directional; intensity: 0.9;" position="1 3 2"></a-entity>

      <!-- MARKER -->
      <a-marker id="marker-main" type="pattern" url="pattern-illum.patt">

        <!-- MODEL 0 -->
        <a-entity id="model0"
                  gltf-model="url(cone.glb)"
                  scale="12 12 12"
                  force-white
                  visible="true">
        </a-entity>

        <!-- MODEL 1 -->
        <a-entity id="model1"
                  gltf-model="url(stair.glb)"
                  scale="12 12 12"
                  force-white
                  visible="false">
        </a-entity>

        <!-- MODEL 2 -->
        <a-entity id="model2"
                  gltf-model="url(wall.glb)"
                  scale="12 12 12"
                  force-white
                  visible="false">
        </a-entity>

        <!-- MODEL 3 -->
        <a-entity id="model3"
                  gltf-model="url(window.glb)"
                  scale="12 12 12"
                  force-white
                  visible="false">
        </a-entity>

        <!-- OPTIONAL DIAL VISUAL -->
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
        <a-circle rotation="-90 0 0" radius="0.6" color="#CCC" opacity="0.2"></a-circle>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
